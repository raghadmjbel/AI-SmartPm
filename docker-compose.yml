services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartpm_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-YourStrong@Pass123}"
      MSSQL_PID: "Developer"
      MSSQL_MEMORY_LIMIT_MB: "1024"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/1433 && exit 0 || exit 1'"]
      interval: 15s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  ai-service:
    build:
      context: ./AI_Module
      dockerfile: Dockerfile
    container_name: smartpm_ai
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(3); s.connect((\"127.0.0.1\",8000)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smartpm_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./Backend/SmartPm.Api
      dockerfile: Dockerfile
    container_name: smartpm_api
    ports:
      - "5054:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=SmartPmDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong@Pass123};TrustServerCertificate=True"
      Jwt__Key: "SmartPm_Super_Secret_Key_2026_123456789"
      Jwt__Issuer: "${JWT_ISSUER:-SmartPm.Api}"
      Jwt__Audience: "${JWT_AUDIENCE:-SmartPm.Client}"
      AIService__BaseUrl: "http://ai-service:8000"
      Redis__ConnectionString: "redis:6379"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && exit 0 || exit 1'"]
      interval: 15s
      timeout: 10s
      retries: 20
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./smartpm-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api}"
    container_name: smartpm_web
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api}"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
